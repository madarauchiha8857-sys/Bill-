
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Export Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <div id="main-ui" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div id="progress-container">
            <h1 class="text-xl font-bold text-gray-800">Exporting Data</h1>
            <p class="text-gray-500 text-sm mb-6">Manisha Archive (290GB)</p>
            
            <div class="flex justify-between text-xs font-bold text-blue-600 mb-1">
                <span id="status-text">Starting...</span>
                <span id="percent-text">0%</span>
            </div>
            
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2 w-0 transition-all duration-500"></div>
            </div>
            <button id="start-btn" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Initialize Export</button>
        </div>

        <div id="menu-container" class="hidden mt-6">
            <h2 class="font-bold text-gray-800 mb-4">Files Ready to Download:</h2>
            <div id="file-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status-text');
        const percentText = document.getElementById('percent-text');
        const menu = document.getElementById('menu-container');
        const fileList = document.getElementById('file-list');

        const items = ["Manisha Chats", "Manisha Video Calls", "Manisha Voice Calls", "Manisha Recording", "Manisha Images"];

        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            
            // Seedha 98% se start
            updateUI(98, "Starting Export...");
            
            // 98% se 99% ka process
            await simulate(98, 99, 10000, "Extracting...");
            
            // 99% se 100% ka stuck process (3 ghante)
            await simulate(99, 100, 3 * 60 * 60 * 1000, "Finalizing (Stuck at 99%)...");
            
            showMenu();
        });

        function showMenu() {
            menu.classList.remove('hidden');
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 border rounded-xl bg-gray-50 shadow-sm";
                div.innerHTML = `
                    <span class="font-medium text-gray-700">${item}</span>
                    <div id="action-container-${index}" class="flex items-center space-x-3">
                        <span id="timer-${index}" class="text-[10px] text-red-500 font-mono font-bold">0:12:00</span>
                        <div id="spinner-${index}" class="spinner"></div>
                    </div>
                `;
                fileList.appendChild(div);
                startCountdown(index, 12 * 60); 
            });
        }

        function startCountdown(index, totalSeconds) {
            let seconds = totalSeconds;
            const timerEl = document.getElementById(`timer-${index}`);
            const actionContainer = document.getElementById(`action-container-${index}`);
            
            const interval = setInterval(() => {
                if (seconds > 0) {
                    seconds -= 1;
                    const hours = Math.floor(seconds / 3600);
                    const mins = Math.floor((seconds % 3600) / 60);
                    const secs = seconds % 60;
                    timerEl.innerText = `${hours}:${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
                } else {
                    clearInterval(interval);
                    actionContainer.innerHTML = `<button onclick="startDownload(${index})" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold">Download</button>`;
                }
            }, 1000);
        }

        function startDownload(index) {
            const container = document.getElementById(`action-container-${index}`);
            container.innerHTML = `<div class="spinner"></div><span class="text-xs text-blue-600">Downloading...</span>`;
        }

        function updateUI(p, msg) {
            bar.style.width = p + "%";
            percentText.innerText = Math.floor(p) + "%";
            status.innerText = msg;
        }

        function simulate(start, end, durationMs, msg) {
            return new Promise(resolve => {
                let current = start;
                const stepTime = durationMs / (end - start);
                const interval = setInterval(() => {
                    current++;
                    updateUI(current, msg);
                    if (current >= end) {
                        clearInterval(interval);
                        resolve();
                    }
                }, stepTime);
            });
        }
    </script>
</body>
</html>
