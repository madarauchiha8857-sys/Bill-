<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto h-screen flex flex-col">
        <!-- Auth Screen -->
        <div id="authScreen" class="flex-1 flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
                <h1 id="authTitle" class="text-2xl font-bold mb-6 text-center">Login</h1>
                <div class="space-y-4">
                    <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg">
                    <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg">
                    <p id="authError" class="text-red-500 text-xs text-center font-medium"></p>
                    <button id="authBtn" class="w-full bg-green-600 text-white p-3 rounded-lg font-semibold">Login</button>
                    <p id="toggleAuth" class="mt-4 text-center cursor-pointer text-blue-600 text-sm">Need an account? Sign Up</p>
                </div>
            </div>
        </div>

        <!-- Chat Dashboard -->
        <div id="chatDashboard" class="hidden flex-1 flex h-full overflow-hidden">
            <!-- Sidebar -->
            <div class="w-1/3 bg-white border-r flex flex-col">
                <div class="p-4 border-b font-bold flex justify-between">
                    <span>Chats</span>
                    <button id="logoutBtn" class="text-red-500 text-sm">Logout</button>
                </div>
                <div class="p-2 border-b">
                    <input id="searchId" type="text" placeholder="Search ID..." class="w-full p-2 border rounded text-sm mb-2">
                    <button id="addFriendBtn" class="w-full bg-blue-500 text-white py-1 rounded text-sm">Add Friend</button>
                </div>
                <div id="friendsList" class="flex-1 overflow-y-auto"></div>
            </div>
            <!-- Window -->
            <div id="chatWindow" class="w-2/3 bg-gray-50 flex flex-col">
                <div id="chatHeader" class="p-4 border-b bg-white font-medium">Select a chat</div>
                <div id="messagesContainer" class="flex-1 p-4 overflow-y-auto space-y-2"></div>
                <div class="p-4 border-t flex gap-2">
                    <input id="msgInput" class="flex-1 p-2 border rounded" placeholder="Type a message...">
                    <button id="sendBtn" class="bg-green-600 text-white px-4 py-2 rounded">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        async function encryptMessage(message, key) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key.padEnd(32, '0').slice(0, 32)), { name: "AES-GCM" }, false, ["encrypt"]);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, keyMaterial, enc.encode(message));
            return btoa(String.fromCharCode(...iv) + String.fromCharCode(...new Uint8Array(encrypted)));
        }

        async function decryptMessage(encryptedData, key) {
            try {
                const raw = atob(encryptedData);
                const iv = new Uint8Array(Array.from(raw.slice(0, 12)).map(c => c.charCodeAt(0)));
                const data = new Uint8Array(Array.from(raw.slice(12)).map(c => c.charCodeAt(0)));
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key.padEnd(32, '0').slice(0, 32)), { name: "AES-GCM" }, false, ["decrypt"]);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, keyMaterial, data);
                return new TextDecoder().decode(decrypted);
            } catch (e) { return "Unable to decrypt"; }
        }

        let currentUser = null;
        let activeFriend = null;
        let isSignup = false;

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('chatDashboard').classList.remove('hidden');
                loadFriends();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('chatDashboard').classList.add('hidden');
            }
        });

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');
            errorDiv.innerText = '';
            
            try {
                if (isSignup) {
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    const uniqueId = Math.floor(100000 + Math.random() * 900000).toString();
                    await db.doc(`artifacts/${appId}/public/data/users/${cred.user.uid}`).set({ uid: cred.user.uid, email, uniqueId });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) { 
                console.error(e); 
                errorDiv.innerText = e.message;
            }
        };

        document.getElementById('toggleAuth').onclick = () => {
            isSignup = !isSignup;
            document.getElementById('authTitle').innerText = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('authBtn').innerText = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('toggleAuth').innerText = isSignup ? 'Already have an account? Login' : 'Need an account? Sign Up';
        };

        function loadFriends() {
            db.collection(`artifacts/${appId}/users/${currentUser.uid}/friends`).onSnapshot(snap => {
                const list = document.getElementById('friendsList');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const f = doc.data();
                    const div = document.createElement('div');
                    div.className = 'p-3 border-b cursor-pointer hover:bg-gray-50';
                    div.innerHTML = `<p>${f.email}</p><p class="text-xs text-gray-400">ID: ${f.uniqueId}</p>`;
                    div.onclick = () => startChat(f);
                    list.appendChild(div);
                });
            });
        }

        document.getElementById('addFriendBtn').onclick = async () => {
            const searchId = document.getElementById('searchId').value;
            const snap = await db.collection(`artifacts/${appId}/public/data/users`).where('uniqueId', '==', searchId).get();
            if (!snap.empty) {
                const friendData = snap.docs[0].data();
                await db.doc(`artifacts/${appId}/users/${currentUser.uid}/friends/${friendData.uid}`).set(friendData);
                document.getElementById('searchId').value = '';
            }
        };

        function startChat(friend) {
            activeFriend = friend;
            document.getElementById('chatHeader').innerText = friend.email;
            document.getElementById('messagesContainer').innerHTML = '';
            const chatId = [currentUser.uid, friend.uid].sort().join('_');
            
            db.collection(`artifacts/${appId}/public/data/messages`)
              .where('chatId', '==', chatId)
              .onSnapshot(async snap => {
                const msgs = [];
                for(let doc of snap.docs) {
                    const d = doc.data();
                    const decrypted = await decryptMessage(d.text, chatId);
                    msgs.push({ ...d, text: decrypted });
                }
                msgs.sort((a,b) => a.timestamp - b.timestamp);
                document.getElementById('messagesContainer').innerHTML = msgs.map(m => `
                    <div class="p-2 rounded ${m.senderId === currentUser.uid ? 'bg-green-100 ml-auto' : 'bg-white'} max-w-[70%]">
                        ${m.text}
                    </div>
                `).join('');
            });
        }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !activeFriend) return;
            const chatId = [currentUser.uid, activeFriend.uid].sort().join('_');
            const encrypted = await encryptMessage(input.value, chatId);
            await db.collection(`artifacts/${appId}/public/data/messages`).add({
                chatId,
                senderId: currentUser.uid,
                text: encrypted,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        };

        document.getElementById('logoutBtn').onclick = () => auth.signOut();

    </script>
</body>
</html>
