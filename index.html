
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenzii Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bg-whatsapp { background-color: #075e54; }
        .bg-chat { background-color: #e5ddd5; }
        .msg-sent { background-color: #dcf8c6; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans">
    <div id="app" class="h-full max-w-md mx-auto bg-white shadow-xl flex flex-col relative overflow-hidden">
        <!-- Header -->
        <header id="header" class="bg-whatsapp text-white p-4 flex justify-between items-center shadow-md z-50">
            <div class="flex items-center gap-3">
                <i id="backBtn" data-lucide="arrow-left" class="hidden cursor-pointer" onclick="render('chats')"></i>
                <h1 id="headerTitle" class="text-xl font-bold">Zenzii</h1>
            </div>
            <i id="searchBtn" data-lucide="search" class="cursor-pointer" onclick="toggleSearch()"></i>
        </header>

        <!-- Search Box -->
        <div id="searchBox" class="hidden bg-white p-3 border-b flex items-center gap-2 z-40">
            <input id="searchInput" class="flex-1 p-2 border rounded-full px-4 outline-none" placeholder="Search user ID...">
            <i id="closeSearch" data-lucide="x" class="cursor-pointer" onclick="toggleSearch()"></i>
        </div>

        <!-- Content -->
        <div id="content" class="flex-1 overflow-y-auto bg-gray-50"></div>

        <!-- Navigation -->
        <nav id="navBar" class="bg-white border-t flex justify-around p-4 shadow-lg z-50">
            <i data-lucide="message-circle" class="cursor-pointer text-[#075e54]" onclick="render('chats')"></i>
            <i data-lucide="book-open" class="cursor-pointer text-gray-400" onclick="render('stories')"></i>
            <i data-lucide="settings" class="cursor-pointer text-gray-400" onclick="render('settings')"></i>
        </nav>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('zenziiUser'));
        
        function toggleSearch() {
            document.getElementById('searchBox').classList.toggle('hidden');
        }

        function render(view) {
            const content = document.getElementById('content');
            const navBar = document.getElementById('navBar');
            const searchBtn = document.getElementById('searchBtn');
            const backBtn = document.getElementById('backBtn');
            const headerTitle = document.getElementById('headerTitle');
            const searchBox = document.getElementById('searchBox');

            searchBox.classList.add('hidden'); // Close search on navigation

            if(view === 'chatDetail') {
                navBar.classList.add('hidden');
                searchBtn.classList.add('hidden');
                backBtn.classList.remove('hidden');
                headerTitle.innerText = "Zenzii Team";
                content.className = "flex-1 bg-chat p-4 flex flex-col";
                content.innerHTML = `<div class="flex-1 space-y-2 overflow-y-auto pb-4">
                                        <div class="bg-white p-3 rounded-lg w-fit text-sm shadow-sm">Hello Supreme Being!</div>
                                        <div class="msg-sent p-3 rounded-lg w-fit text-sm shadow-sm ml-auto">Everything is stable now.</div>
                                     </div>
                                     <div class="sticky bottom-0 bg-[#f0f0f0] p-2 flex gap-2 border-t">
                                        <input class="flex-1 p-2 rounded-full px-4 outline-none" placeholder="Type a message...">
                                        <button class="bg-whatsapp text-white p-2 rounded-full"><i data-lucide="send"></i></button>
                                     </div>`;
            } else {
                navBar.classList.remove('hidden');
                searchBtn.classList.remove('hidden');
                backBtn.classList.add('hidden');
                headerTitle.innerText = "Zenzii";
                content.className = "flex-1 overflow-y-auto bg-gray-50";
                
                if(view === 'chats') {
                    content.innerHTML = `<div class="p-4 bg-white flex items-center gap-4 cursor-pointer border-b" onclick="render('chatDetail')">
                                            <div class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center font-bold text-white relative">Z
                                            <span class="absolute bottom-0 right-0 bg-blue-500 rounded-full p-0.5 border-2 border-white"><i data-lucide="check" class="w-2 h-2 text-white"></i></span></div>
                                            <div><h2 class="font-bold">Zenzii Team</h2><p class="text-sm text-gray-500">Everything is stable now.</p></div>
                                         </div>`;
                } else if(view === 'settings') {
                    content.innerHTML = user ? 
                        `<div class="p-6"><button onclick="logout()" class="w-full bg-red-50 text-red-600 p-3 rounded-lg font-bold">Logout</button></div>` :
                        `<div class="p-8 flex flex-col gap-4"><input id="e" placeholder="Email" class="p-3 border-b-2 outline-none"><input id="p" type="password" placeholder="Password" class="p-3 border-b-2 outline-none"><button onclick="login()" class="bg-whatsapp text-white p-3 rounded-full font-bold">Login</button></div>`;
                } else {
                    content.innerHTML = `<div class="p-8 text-center text-gray-500">Coming soon...</div>`;
                }
            }
            lucide.createIcons();
        }

        function login() {
            const email = document.getElementById('e').value;
            if(email) {
                localStorage.setItem('zenziiUser', JSON.stringify({email}));
                location.reload();
            }
        }
        function logout() { localStorage.clear(); location.reload(); }

        render('chats');
    </script>
</body>
</html>
