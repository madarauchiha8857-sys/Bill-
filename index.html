<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazeen Premium | Organic Date Seed Roast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1b3322',
                        accent: '#d4af37',
                        accentHover: '#c19a2e',
                    }
                }
            }
        }
    </script>

    <style>
        .cart-drawer { transition: transform 0.3s ease-in-out; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#faf8f5] font-sans text-gray-900">

    <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div onclick="showPage('home')" class="cursor-pointer flex items-center space-x-2">
                <div class="bg-primary p-1.5 rounded-lg text-accent"><i class="fas fa-seedling"></i></div>
                <span class="text-xl font-black text-primary">DAZEEN</span>
            </div>
            
            <div class="flex items-center space-x-4">
                <input type="text" id="search-bar" onkeyup="filterProducts()" placeholder="Search blends..." class="hidden md:block bg-gray-50 border border-gray-200 rounded-full px-4 py-1.5 text-xs outline-none focus:ring-1 focus:ring-primary w-40">
                <button onclick="toggleCart()" class="relative p-2 hover:bg-gray-100 rounded-full">
                    <i class="fas fa-shopping-bag text-lg text-primary"></i>
                    <span id="cart-count" class="absolute top-0 right-0 bg-accent text-primary text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <div id="cart-drawer" class="cart-drawer fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-50 p-6 cart-closed flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black">Your Cart</h2>
            <button onclick="toggleCart()" class="text-gray-500"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto hide-scrollbar space-y-4"></div>
        <div class="border-t pt-4 mt-4 space-y-3">
            <div class="flex justify-between font-bold"><span>Total</span><span id="cart-total">₹0</span></div>
            <button onclick="checkout()" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-emerald-950">Secure Checkout</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="page-home" class="page-view">
            <div class="mb-8">
                <h1 class="text-3xl font-black mb-2">Fresh Roasted Blends</h1>
                <div class="flex space-x-2">
                    <button onclick="setCategory('all')" class="px-4 py-1.5 bg-primary text-white rounded-full text-xs font-bold">All</button>
                    <button onclick="setCategory('coffee')" class="px-4 py-1.5 bg-gray-200 text-gray-700 rounded-full text-xs font-bold hover:bg-gray-300">Coffee</button>
                </div>
            </div>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <script>
        const products = [
            { id: 1, title: "100g Classic Roast", price: 170, category: "coffee", image: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=400&q=80" },
            { id: 2, title: "250g Premium Blend", price: 290, category: "coffee", image: "https://images.unsplash.com/photo-1498804103079-a6351b050096?w=400&q=80" },
            { id: 3, title: "Date Seed Powder", price: 150, category: "wellness", image: "https://images.unsplash.com/photo-1585499180255-081498c19920?w=400&q=80" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let activeCategory = 'all';

        function renderProducts() {
            const list = document.getElementById('product-list');
            const filtered = activeCategory === 'all' ? products : products.filter(p => p.category === activeCategory);
            list.innerHTML = filtered.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 group">
                    <div class="overflow-hidden rounded-xl mb-4">
                        <img src="${p.image}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <h3 class="font-bold text-sm">${p.title}</h3>
                    <p class="text-primary font-black my-2">₹${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-2 rounded-lg font-bold text-xs hover:bg-primary transition">Add to Cart</button>
                </div>
            `).join('');
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('cart-open');
            drawer.classList.toggle('cart-closed');
        }

        function addToCart(id) {
            const p = products.find(i => i.id === id);
            const exists = cart.find(i => i.id === id);
            if (exists) exists.qty++;
            else cart.push({...p, qty: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const total = document.getElementById('cart-total');
            const count = document.getElementById('cart-count');
            
            let sum = 0;
            list.innerHTML = cart.map(item => {
                sum += item.price * item.qty;
                return `
                    <div class="flex items-center space-x-4">
                        <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg">
                        <div>
                            <p class="text-xs font-bold">${item.title}</p>
                            <p class="text-xs text-gray-500">₹${item.price} x ${item.qty}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            total.innerText = `₹${sum}`;
            count.innerText = cart.reduce((a, b) => a + b.qty, 0);
            count.classList.toggle('hidden', cart.length === 0);
        }

        function setCategory(cat) {
            activeCategory = cat;
            renderProducts();
        }

        function filterProducts() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const list = document.getElementById('product-list');
            const filtered = products.filter(p => p.title.toLowerCase().includes(query));
            list.innerHTML = filtered.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <img src="${p.image}" class="w-full h-48 object-cover rounded-xl mb-4">
                    <h3 class="font-bold text-sm">${p.title}</h3>
                    <p class="text-primary font-black my-2">₹${p.price}</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-primary text-white py-2 rounded-lg font-bold text-xs">Add</button>
                </div>
            `).join('');
        }

        function checkout() {
            alert('Proceeding to secure checkout...');
        }

        function showPage(page) { /* Simple navigation handle */ }

        renderProducts();
        updateCart();
    </script>
</body>
</html>
