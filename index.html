<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenzii Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen overflow-hidden">
    
    <!-- App Container - Always visible -->
    <div id="app" class="max-w-4xl mx-auto h-screen flex flex-col">
        
        <!-- Chat Dashboard - Always visible -->
        <div id="chatDashboard" class="flex-1 flex h-full overflow-hidden bg-white shadow-2xl md:rounded-3xl my-0 md:my-4">
            <!-- Sidebar -->
            <div class="w-1/3 bg-gray-50 border-r flex flex-col">
                <div class="p-5 border-b flex justify-between items-center bg-white">
                    <h2 class="font-bold text-lg text-blue-600">Zenzii</h2>
                    <button id="authTriggerBtn" class="text-blue-600 font-semibold text-sm">Login</button>
                </div>
                <div class="p-4 border-b">
                    <input id="searchId" type="text" placeholder="Friend's Unique ID" class="w-full p-2 border rounded-lg text-sm mb-2 focus:ring-1 focus:ring-blue-500 outline-none">
                    <button id="addFriendBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">Add Friend</button>
                </div>
                <div id="friendsList" class="flex-1 overflow-y-auto">
                    <div class="p-4 text-center text-gray-400 text-sm">Login to see friends</div>
                </div>
            </div>
            
            <!-- Window -->
            <div id="chatWindow" class="w-2/3 flex flex-col bg-white">
                <div id="chatHeader" class="p-4 border-b font-medium text-gray-700 shadow-sm">Select a chat</div>
                <div id="messagesContainer" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
                    <div class="text-center text-gray-400 mt-10">Zenzii Chat</div>
                </div>
                <div class="p-4 bg-white border-t flex gap-2">
                    <input id="msgInput" class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type a message...">
                    <button id="sendBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Modal (Hidden by default) -->
    <div id="authModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-xl border w-full max-w-sm">
            <h1 id="authTitle" class="text-2xl font-bold mb-6 text-center text-blue-600">Zenzii Login</h1>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <div id="authError" class="text-red-500 text-xs text-center font-medium h-4"></div>
                <button id="authBtn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-semibold hover:bg-blue-700 transition">Login</button>
                <p id="toggleAuth" class="mt-4 text-center cursor-pointer text-gray-500 hover:text-blue-600 text-sm transition">Need an account? Sign Up</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let isSignup = false;

        const modal = document.getElementById('authModal');
        const triggerBtn = document.getElementById('authTriggerBtn');

        function toggleModal(show) {
            modal.classList.toggle('hidden', !show);
        }

        triggerBtn.onclick = () => toggleModal(true);

        auth.onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                toggleModal(false);
                triggerBtn.innerText = 'Logout';
                loadFriends();
            } else {
                triggerBtn.innerText = 'Login';
            }
        });

        async function encryptMessage(message, key) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key.padEnd(32, '0').slice(0, 32)), { name: "AES-GCM" }, false, ["encrypt"]);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, keyMaterial, enc.encode(message));
            return btoa(String.fromCharCode(...iv) + String.fromCharCode(...new Uint8Array(encrypted)));
        }

        async function decryptMessage(encryptedData, key) {
            try {
                const raw = atob(encryptedData);
                const iv = new Uint8Array(Array.from(raw.slice(0, 12)).map(c => c.charCodeAt(0)));
                const data = new Uint8Array(Array.from(raw.slice(12)).map(c => c.charCodeAt(0)));
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(key.padEnd(32, '0').slice(0, 32)), { name: "AES-GCM" }, false, ["decrypt"]);
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, keyMaterial, data);
                return new TextDecoder().decode(decrypted);
            } catch (e) { return "Unable to decrypt"; }
        }

        document.getElementById('authBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('authError');
            try {
                if (isSignup) {
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    const uniqueId = Math.floor(100000 + Math.random() * 900000).toString();
                    await db.doc(`artifacts/${appId}/public/data/users/${cred.user.uid}`).set({ uid: cred.user.uid, email, uniqueId });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) { errorDiv.innerText = e.message; }
        };

        document.getElementById('toggleAuth').onclick = () => {
            isSignup = !isSignup;
            document.getElementById('authTitle').innerText = isSignup ? 'Zenzii - Join' : 'Zenzii Login';
            document.getElementById('authBtn').innerText = isSignup ? 'Sign Up' : 'Login';
            document.getElementById('toggleAuth').innerText = isSignup ? 'Already have an account? Login' : 'Need an account? Sign Up';
        };

        function loadFriends() {
            if (!currentUser) return;
            db.collection(`artifacts/${appId}/users/${currentUser.uid}/friends`).onSnapshot(snap => {
                const list = document.getElementById('friendsList');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const f = doc.data();
                    const div = document.createElement('div');
                    div.className = 'p-4 border-b cursor-pointer hover:bg-blue-50 flex justify-between items-center';
                    div.innerHTML = `<div><p class="font-medium text-sm text-gray-700">${f.email}</p><p class="text-[10px] text-gray-400">ID: ${f.uniqueId}</p></div>`;
                    div.onclick = () => startChat(f);
                    list.appendChild(div);
                });
            });
        }

        document.getElementById('addFriendBtn').onclick = async () => {
            if (!currentUser) { toggleModal(true); return; }
            const searchId = document.getElementById('searchId').value;
            const snap = await db.collection(`artifacts/${appId}/public/data/users`).where('uniqueId', '==', searchId).get();
            if (!snap.empty) {
                const friendData = snap.docs[0].data();
                await db.doc(`artifacts/${appId}/users/${currentUser.uid}/friends/${friendData.uid}`).set(friendData);
                document.getElementById('searchId').value = '';
            } else {
                alert("User not found!");
            }
        };

        let activeFriend = null;
        function startChat(friend) {
            activeFriend = friend;
            document.getElementById('chatHeader').innerText = `Chat: ${friend.email}`;
            const chatId = [currentUser.uid, friend.uid].sort().join('_');
            
            db.collection(`artifacts/${appId}/public/data/messages`)
              .where('chatId', '==', chatId)
              .onSnapshot(async snap => {
                const msgs = [];
                for(let doc of snap.docs) {
                    const d = doc.data();
                    const decrypted = await decryptMessage(d.text, chatId);
                    msgs.push({ ...d, text: decrypted });
                }
                msgs.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                document.getElementById('messagesContainer').innerHTML = msgs.map(m => `
                    <div class="flex ${m.senderId === currentUser.uid ? 'justify-end' : 'justify-start'}">
                        <div class="p-3 rounded-2xl max-w-[75%] ${m.senderId === currentUser.uid ? 'bg-blue-600 text-white' : 'bg-white border'}">
                            ${m.text}
                        </div>
                    </div>
                `).join('');
                document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
            });
        }

        async function sendMessage() {
            if (!currentUser) { toggleModal(true); return; }
            const input = document.getElementById('msgInput');
            if(!input.value.trim() || !activeFriend) return;
            const chatId = [currentUser.uid, activeFriend.uid].sort().join('_');
            const encrypted = await encryptMessage(input.value, chatId);
            await db.collection(`artifacts/${appId}/public/data/messages`).add({
                chatId,
                senderId: currentUser.uid,
                text: encrypted,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
        triggerBtn.onclick = () => {
            if (currentUser) auth.signOut();
            else toggleModal(true);
        };
    </script>
</body>
</html>
