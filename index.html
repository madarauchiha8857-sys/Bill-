
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Supreme Being Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-8 bg-slate-900 rounded-2xl shadow-2xl border border-slate-700 mx-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
            <p class="text-slate-400 mt-2">Supreme Being, please login to continue.</p>
        </div>

        <form onsubmit="event.preventDefault(); showMessage();" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300">Email Address</label>
                <input type="email" required class="w-full mt-1 p-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300">Password</label>
                <input type="password" required class="w-full mt-1 p-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition duration-300">
                Sign In
            </button>
        </form>

        <div id="messageBox" class="hidden mt-6 p-4 rounded-lg text-center bg-emerald-500/10 text-emerald-400 border border-emerald-500/50">
            Access Granted.div>
    </div>

    <script>
        function showMessage() {
            const box = document.getElementById('messageBox');
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
