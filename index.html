
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenzii Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans">

    <div id="app" class="h-full flex flex-col max-w-md mx-auto bg-white shadow-xl relative overflow-hidden">
        <header class="bg-emerald-600 text-white p-4 flex justify-between items-center shadow-md z-20">
            <h1 id="headerTitle" class="text-xl font-bold">Zenzii</h1>
            <i id="searchBtn" data-lucide="search" class="cursor-pointer"></i>
        </header>

        <div id="contentArea" class="flex-1 overflow-y-auto pb-20 p-4 fade-in"></div>

        <nav class="absolute bottom-0 w-full bg-white border-t flex justify-around p-4 shadow-lg z-30">
            <i id="navChats" data-lucide="message-circle" class="text-emerald-600 cursor-pointer"></i>
            <i id="navStories" data-lucide="book-open" class="text-gray-400 cursor-pointer"></i>
            <i id="navSettings" data-lucide="settings" class="text-gray-400 cursor-pointer"></i>
        </nav>
    </div>

    <div id="loginModal" class="hidden absolute inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Login to Zenzii</h2>
            <input id="emailInput" type="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3">
            <input id="passInput" type="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-4">
            <button id="loginSubmit" class="w-full bg-emerald-600 text-white py-2 rounded-xl mb-2 font-bold">Login</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Initial check for existing session
        let userData = JSON.parse(localStorage.getItem('zenziiUser')) || { isLoggedIn: false, email: "", userId: "", name: "Supreme Being" };

        function renderChats() {
            document.getElementById('contentArea').innerHTML = `
                <div id="chatList" class="p-4 bg-white hover:bg-gray-50 flex items-center gap-4 cursor-pointer border-b fade-in">
                    <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold">Z</div>
                    <div>
                        <h2 class="font-semibold">Zenzii Team</h2>
                        <p class="text-sm text-gray-500">Welcome back, Supreme Being!</p>
                    </div>
                </div>
            `;
            document.getElementById('chatList').onclick = openChat;
        }

        function openChat() {
            document.getElementById('contentArea').innerHTML = `
                <div class="flex flex-col h-full fade-in">
                    <div class="flex items-center gap-2 mb-4 cursor-pointer" onclick="renderChats()">
                        <i data-lucide="arrow-left"></i> <span class="font-bold">Back</span>
                    </div>
                    <div id="msgContainer" class="flex-1 bg-emerald-50 p-4 rounded-xl mb-4 overflow-y-auto">
                        <p class="bg-white p-3 rounded-lg shadow-sm mb-2">Hello! How can I help you today?</p>
                    </div>
                    <div class="flex gap-2">
                        <input id="msgInput" type="text" placeholder="Type..." class="flex-1 p-2 border rounded-full">
                        <button id="sendBtn" class="bg-emerald-600 text-white px-4 py-2 rounded-full">Send</button>
                    </div>
                </div>
            `;
            document.getElementById('sendBtn').onclick = () => {
                const msg = document.getElementById('msgInput').value;
                if(msg) {
                    const div = document.createElement('p');
                    div.className = "bg-emerald-600 text-white p-3 rounded-lg shadow-sm mb-2 ml-auto w-fit";
                    div.innerText = msg;
                    document.getElementById('msgContainer').appendChild(div);
                    document.getElementById('msgInput').value = '';
                }
            };
            lucide.createIcons();
        }

        document.getElementById('searchBtn').onclick = () => {
            if(!userData.isLoggedIn) { document.getElementById('loginModal').classList.remove('hidden'); return; }
            const searchId = prompt("Enter User ID to search (e.g., z123456)");
            if(searchId) openChat();
        };

        document.getElementById('navSettings').onclick = () => {
            if(!userData.isLoggedIn) { document.getElementById('loginModal').classList.remove('hidden'); return; }
            document.getElementById('contentArea').innerHTML = `
                <div class="fade-in">
                    <h2 class="font-bold text-lg mb-4">Account Details</h2>
                    <div class="space-y-3 bg-white p-4 rounded-xl border">
                        <p><strong>Name:</strong> ${userData.name}</p>
                        <p><strong>Email:</strong> ${userData.email}</p>
                        <p><strong>Unique ID:</strong> <span class="font-mono bg-gray-100 p-1 px-2 rounded">${userData.userId}</span></p>
                        <button id="logoutBtn" class="w-full mt-4 bg-red-500 text-white py-2 rounded-xl">Logout</button>
                    </div>
                </div>`;
            document.getElementById('logoutBtn').onclick = () => {
                localStorage.clear();
                userData = { isLoggedIn: false, email: "", userId: "", name: "Supreme Being" };
                renderChats();
            };
        };

        document.getElementById('loginSubmit').onclick = () => {
            userData.isLoggedIn = true;
            userData.email = document.getElementById('emailInput').value;
            userData.userId = "z" + Math.floor(Math.random() * 900000 + 100000);
            localStorage.setItem('zenziiUser', JSON.stringify(userData));
            document.getElementById('loginModal').classList.add('hidden');
            renderChats();
        };

        document.getElementById('navChats').onclick = renderChats;
        renderChats();
    </script>
</body>
</html>
