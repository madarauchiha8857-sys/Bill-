
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Export Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <div id="main-ui" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div id="progress-container">
            <h1 class="text-xl font-bold text-gray-800">Exporting Data</h1>
            <p class="text-gray-500 text-sm mb-6">Manisha Archive (290GB)</p>
            
            <div class="flex justify-between text-xs font-bold text-blue-600 mb-1">
                <span id="status-text">Starting...</span>
                <span id="percent-text">0%</span>
            </div>
            
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2 w-0 transition-all duration-500"></div>
            </div>
            <button id="start-btn" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Initialize Export</button>
        </div>

        <!-- Chat Section (Initially Hidden) -->
        <div id="chat-container" class="hidden mt-6">
            <h2 class="font-bold text-gray-800 mb-4">Messages (200+ Chats)</h2>
            <div id="chat-list" class="space-y-4 h-96 overflow-y-auto pr-2 border-t pt-4"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const progressContainer = document.getElementById('progress-container');
        const chatContainer = document.getElementById('chat-container');
        const chatList = document.getElementById('chat-list');

        startBtn.addEventListener('click', () => {
            startBtn.classList.add('hidden');
            let p = 0;
            const interval = setInterval(() => {
                p++;
                document.getElementById('progress-bar').style.width = p + "%";
                document.getElementById('percent-text').innerText = p + "%";
                document.getElementById('status-text').innerText = "Processing Files...";
                
                if (p >= 100) {
                    clearInterval(interval);
                    progressContainer.classList.add('hidden');
                    loadChats();
                    chatContainer.classList.remove('hidden');
                }
            }, 30);
        });

        function loadChats() {
            // First special chat
            const firstChat = document.createElement('div');
            firstChat.className = "p-3 bg-blue-50 border border-blue-200 rounded-lg";
            firstChat.innerHTML = `
                <p class="text-xs text-gray-500 mb-1">Manisha: 10:45 AM</p>
                <p class="text-sm font-bold text-blue-900 mb-2">Check this file:</p>
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-600 truncate">a0da5755-47b1-4a0a-a575-afa878a925b6.jpeg</span>
                    <button onclick="downloadFile('a0da5755-47b1-4a0a-a575-afa878a925b6.jpeg')" class="bg-green-600 text-white px-2 py-1 rounded text-[10px] uppercase font-bold">Download</button>
                </div>
            `;
            chatList.appendChild(firstChat);

            // 200 dummy chats with download options
            for (let i = 1; i <= 200; i++) {
                const div = document.createElement('div');
                div.className = "p-3 border rounded-lg bg-gray-50 flex justify-between items-center";
                div.innerHTML = `
                    <p class="text-sm text-gray-600 truncate w-3/4">Chat log #${i}: Hello Manisha...</p>
                    <button onclick="downloadFile('chat_log_${i}.txt')" class="bg-gray-400 text-white px-2 py-1 rounded text-[10px] uppercase font-bold">Download</button>
                `;
                chatList.appendChild(div);
            }
        }

        function downloadFile(filename) {
            alert("Downloading " + filename + "...");
        }
    </script>
</body>
</html>
