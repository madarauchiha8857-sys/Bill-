<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dazeen | Caffeine-Free Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .bg-coffee { background-color: #4a3728; }
        .text-coffee { color: #4a3728; }
        .border-coffee { border-color: #4a3728; }
        .success-anim { animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .nav-active { color: #059669; font-weight: 700; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-stone-200">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-coffee flex items-center gap-2 cursor-pointer" onclick="showView('shop')">
                <i data-lucide="coffee"></i> Dazeen
            </h1>
            <div class="flex gap-6 font-semibold text-stone-600">
                <button onclick="showView('shop')" class="hover:text-emerald-700 transition">Shop</button>
                <button onclick="showView('orders')" class="hover:text-emerald-700 transition">Orders</button>
                <button onclick="showView('account')" class="hover:text-emerald-700 transition">Account</button>
            </div>
            <button onclick="showView('cart')" class="relative p-2 hover:bg-stone-100 rounded-full transition">
                <i data-lucide="shopping-bag" class="text-coffee"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-emerald-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dazeen-default';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.collection = collection;
        window.getDocs = getDocs;
        window.addDoc = addDoc;
        window.doc = doc;
        window.setDoc = setDoc;

        // Initialize user session
        signInAnonymously(auth).then(() => {
            console.log("User signed in");
            loadProducts();
        });
    </script>

    <div id="views-container" class="max-w-5xl mx-auto p-6">
        <section id="shop-view" class="view">
            <div class="bg-emerald-900 text-emerald-50 p-12 rounded-[2rem] mb-12 relative overflow-hidden">
                <h2 class="text-5xl font-bold mb-4">Pure Coffee, <br>Zero Caffeine.</h2>
                <p class="text-emerald-200 text-lg max-w-lg mb-8">Crafted for those who love the ritual of coffee, without the impact of caffeine. Ethically sourced.</p>
                <button onclick="document.getElementById('product-list').scrollIntoView({behavior:'smooth'})" class="bg-amber-500 text-emerald-900 px-8 py-4 rounded-xl font-bold hover:bg-amber-400 transition">Explore</button>
            </div>
            
            <h2 class="text-3xl font-bold mb-8 text-coffee">Our Signature Blends</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="product-list">
                <!-- Products loaded by JS -->
            </div>
        </section>

        <section id="detail-view" class="view hidden">
            <button onclick="showView('shop')" class="mb-6 flex items-center gap-2 text-stone-500 hover:text-coffee">
                <i data-lucide="arrow-left"></i> Back to Shop
            </button>
            <div id="product-detail-content" class="grid md:grid-cols-2 gap-12 bg-white p-8 rounded-3xl border"></div>
        </section>

        <section id="cart-view" class="view hidden max-w-xl mx-auto"><div id="cart-content"></div></section>
        <section id="orders-view" class="view hidden"><h2 class="text-3xl font-bold mb-8 text-coffee">My Orders</h2><div id="orders-list"></div></section>
        <section id="account-view" class="view hidden text-center py-20"><div id="account-content" class="bg-white p-12 rounded-3xl border shadow-sm max-w-md mx-auto"></div></section>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-6 hidden z-[60]">
        <div id="login-box" class="bg-white p-10 rounded-[2rem] w-full max-w-sm shadow-2xl relative">
            <h2 class="text-3xl font-bold mb-2 text-coffee">Welcome back</h2>
            <p class="text-stone-500 mb-8">Sign in to save your progress.</p>
            <input type="email" id="email-in" placeholder="Email address" class="w-full p-4 border rounded-xl mb-4 bg-stone-50" />
            <input type="password" id="pass-in" placeholder="Password" class="w-full p-4 border rounded-xl mb-8 bg-stone-50" />
            <button onclick="handleLogin()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold">Sign In</button>
        </div>
    </div>

    <script>
        let cart = [];
        let products = [
            { id: 1, name: "Golden Morning Roast", price: 599, desc: "Smooth, nutty, caffeine-free.", img: "https://placehold.co/400x300/eab308/white?text=Coffee1" },
            { id: 2, name: "Midnight Decaf Blend", price: 649, desc: "Rich, intense, no jitters.", img: "https://placehold.co/400x300/4a3728/white?text=Coffee2" }
        ];

        async function loadProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="bg-white p-6 rounded-3xl border hover:shadow-xl transition cursor-pointer" onclick="viewProduct(${p.id})">
                    <img src="${p.img}" class="rounded-2xl mb-4 w-full h-48 object-cover">
                    <h3 class="font-bold text-2xl text-coffee mb-2">${p.name}</h3>
                    <p class="text-stone-500 mb-6">${p.desc}</p>
                    <span class="font-bold text-2xl text-emerald-700">₹${p.price}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function viewProduct(id) {
            const p = products.find(x => x.id === id);
            const detail = document.getElementById('product-detail-content');
            detail.innerHTML = `
                <img src="${p.img}" class="rounded-2xl w-full h-64 object-cover">
                <div>
                    <h2 class="text-4xl font-bold text-coffee mb-4">${p.name}</h2>
                    <p class="text-stone-600 mb-6">${p.desc} This is our premium blend sourced from the best estates.</p>
                    <div class="text-3xl font-bold text-emerald-700 mb-8">₹${p.price}</div>
                    <button onclick="addToCart(${p.id}); showView('shop')" class="bg-coffee text-white w-full py-4 rounded-xl font-bold">Buy Now</button>
                </div>
            `;
            showView('detail');
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId + '-view').classList.remove('hidden');
            lucide.createIcons();
        }

        function addToCart(pid) {
            const p = products.find(x => x.id === pid);
            cart.push(p);
            document.getElementById('cart-count').innerText = cart.length;
        }

        function handleLogin() {
            const box = document.getElementById('login-box');
            box.classList.remove('success-anim');
            void box.offsetWidth; // Force reflow
            box.classList.add('success-anim');
            setTimeout(() => {
                document.getElementById('login-modal').classList.add('hidden');
            }, 600);
        }

        lucide.createIcons();
    </script>
</body>
</html>
