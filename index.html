
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Export Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <!-- Desktop-style download panel (Top Right) -->
    <div id="download-panel" class="fixed top-5 right-5 w-72 bg-white rounded-xl shadow-2xl border border-gray-200 hidden p-4">
        <h3 class="text-sm font-bold text-gray-800 mb-3">Active Downloads</h3>
        <div id="active-downloads" class="space-y-4"></div>
    </div>

    <div id="main-ui" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div id="progress-container">
            <h1 class="text-xl font-bold text-gray-800">Exporting Data</h1>
            <p class="text-gray-500 text-sm mb-6">Manisha Archive (290GB)</p>
            
            <div class="flex justify-between text-xs font-bold text-blue-600 mb-1">
                <span id="status-text">Starting...</span>
                <span id="percent-text">0%</span>
            </div>
            
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2 w-0 transition-all duration-500"></div>
            </div>
            <button id="start-btn" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Initialize Export</button>
        </div>

        <div id="menu-container" class="hidden mt-6">
            <h2 class="font-bold text-gray-800 mb-4">Select Source to Download:</h2>
            <div id="file-list" class="space-y-3 h-64 overflow-y-auto pr-2 border-t pt-4"></div>
        </div>
    </div>

    <!-- Native System-Style Error Modal -->
    <div id="error-modal" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-xs w-full shadow-2xl overflow-hidden border border-gray-200">
            <div class="p-5 text-center">
                <div class="mb-3">
                    <svg class="mx-auto w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="text-md font-semibold text-gray-900">SSD Compatibility Error</h3>
                <p class="text-sm text-gray-500 mt-2">Your SSD is not capable of handling this file. Please upgrade to a higher performance SSD.</p>
            </div>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="w-full py-3 text-blue-600 font-semibold border-t border-gray-100 active:bg-gray-50">
                OK
            </button>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const menu = document.getElementById('menu-container');
        const fileList = document.getElementById('file-list');
        const downloadPanel = document.getElementById('download-panel');
        const activeDownloads = document.getElementById('active-downloads');

        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            let p = 0;
            const fastInterval = setInterval(() => {
                p++;
                updateUI(p, "Initializing source lists...");
                if (p >= 99) {
                    clearInterval(fastInterval);
                    showOptions();
                }
            }, 10); 
        });

        function showOptions() {
            menu.classList.remove('hidden');
            for (let i = 1; i <= 30; i++) {
                const size = (Math.random() * (20 - 9) + 9).toFixed(1);
                const duration = Math.floor(Math.random() * (180 - 45 + 1) + 45);
                const min = Math.floor(duration / 60);
                const sec = duration % 60;
                
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 border rounded-lg bg-gray-50 shadow-sm";
                div.innerHTML = `
                    <span class="text-sm font-medium text-gray-700">Manisha Video ${i} (${size}GB) - ${min}m ${sec}s</span>
                    <button onclick="startDownload(${i}, ${size})" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-green-700">Download</button>
                `;
                fileList.appendChild(div);
            }
        }

        function startDownload(id, size) {
            downloadPanel.classList.remove('hidden');
            const downloadItem = document.createElement('div');
            downloadItem.className = "text-xs border-b pb-2";
            downloadItem.id = `download-item-${id}`;
            downloadItem.innerHTML = `
                <div class="flex justify-between mb-1">
                    <span class="font-bold">Manisha Video ${id} (${size}GB)</span>
                    <span id="prog-text-${id}">0%</span>
                </div>
                <div class="w-full bg-gray-200 h-1.5 rounded-full">
                    <div id="prog-bar-${id}" class="bg-green-500 h-1.5 w-0 rounded-full transition-all"></div>
                </div>
            `;
            activeDownloads.appendChild(downloadItem);

            let progress = 0;
            // 7-10 minutes = 420s to 600s. Average 510s. 
            // 510s / 100 steps = 5.1s (5100ms) delay per step
            const interval = setInterval(() => {
                progress += 1;
                document.getElementById(`prog-text-${id}`).innerText = progress + "%";
                document.getElementById(`prog-bar-${id}`).style.width = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);
                    const item = document.getElementById(`download-item-${id}`);
                    item.innerHTML = `
                        <div class="cursor-pointer text-blue-600 font-bold p-2 bg-blue-50 rounded mt-1 hover:underline" onclick="document.getElementById('error-modal').classList.remove('hidden')">
                            Manisha Video ${id}.mp4 (Click to open)
                        </div>
                    `;
                }
            }, 5100); 
        }

        function updateUI(p, msg) {
            document.getElementById('progress-bar').style.width = p + "%";
            document.getElementById('percent-text').innerText = Math.floor(p) + "%";
            document.getElementById('status-text').innerText = msg;
        }
    </script>
</body>
</html>
