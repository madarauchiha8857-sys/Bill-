
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Data Recovery Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-lg border-b border-black pb-8 mb-8 text-center">
        <h1 class="text-3xl font-bold tracking-tighter uppercase mb-2">System Intercept</h1>
        <p class="text-sm text-gray-600">Accessing secure database servers...</p>
    </div>
    
    <div class="w-full max-w-lg space-y-6">
        <div class="flex gap-2">
            <input type="text" id="username" placeholder="TARGET_USER_ID" 
                class="w-full border border-black px-4 py-3 outline-none focus:bg-gray-100 uppercase font-bold">
            <button onclick="startFinding()" id="findBtn" 
                class="bg-black text-white px-8 py-3 font-bold hover:bg-gray-800 transition">FIND</button>
        </div>

        <div id="loader" class="hidden flex items-center gap-4 py-6">
            <div class="loader"></div>
            <p class="font-bold animate-pulse text-sm">ENCRYPTING CONNECTION...</p>
        </div>

        <div id="result" class="hidden space-y-4 pt-6 border-t border-black">
            <div class="grid grid-cols-2 gap-4 text-sm">
                <p><span class="font-bold">PHONE:</span> 98*******79</p>
                <p><span class="font-bold">EMAIL:</span> S*********0@gmail.com</p>
                <p class="col-span-2"><span class="font-bold">IP_ADDR:</span> 1.7***********.78</p>
            </div>
            
            <button onclick="payNow()" 
                class="w-full border-2 border-black py-4 font-bold hover:bg-black hover:text-white transition mt-4">
                EXECUTE PAYMENT: ₹1294
            </button>
        </div>
    </div>

    <script>
        function startFinding() {
            const btn = document.getElementById('findBtn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.classList.add('opacity-50');
            loader.classList.remove('hidden');
            result.classList.add('hidden');

            setTimeout(() => {
                loader.classList.add('hidden');
                result.classList.remove('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }, 15000);
        }

        function payNow() {
            alert("Redirecting to encrypted gateway...");
        }
    </script>
</body>
</html>
