
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Export Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

    <div id="main-ui" class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <div id="progress-container">
            <h1 class="text-xl font-bold text-gray-800">Exporting Data</h1>
            <p class="text-gray-500 text-sm mb-6">Manisha Archive (290GB)</p>
            
            <div class="flex justify-between text-xs font-bold text-blue-600 mb-1">
                <span id="status-text">Starting...</span>
                <span id="percent-text">0%</span>
            </div>
            
            <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2 w-0 transition-all duration-500"></div>
            </div>
            <button id="start-btn" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Initialize Export</button>
        </div>

        <div id="menu-container" class="hidden mt-6">
            <h2 class="font-bold text-gray-800 mb-4">Files Ready to Download:</h2>
            <div id="file-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const menu = document.getElementById('menu-container');
        const fileList = document.getElementById('file-list');

        const items = ["Manisha Chats", "Manisha Video Calls", "Manisha Voice Calls", "Manisha Recording", "Manisha Images"];

        startBtn.addEventListener('click', async () => {
            startBtn.classList.add('hidden');
            let p = 0;
            const fastInterval = setInterval(() => {
                p++;
                updateUI(p, "Exporting...");
                if (p >= 99) {
                    clearInterval(fastInterval);
                    showMenu();
                }
            }, 10); 
        });

        function showMenu() {
            menu.classList.remove('hidden');
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-4 border rounded-xl bg-gray-50 shadow-sm";
                div.innerHTML = `
                    <span class="font-medium text-gray-700">${item}</span>
                    <div id="action-container-${index}" class="flex items-center space-x-3">
                        <button onclick="startDownload(${index})" class="bg-green-600 text-white px-3 py-1 rounded text-xs font-bold">Download</button>
                    </div>
                `;
                fileList.appendChild(div);
            });
        }

        async function startDownload(index) {
            const container = document.getElementById(`action-container-${index}`);
            let downloadProgress = 1;

            const updateDownload = () => {
                if (downloadProgress <= 98) {
                    container.innerHTML = `<span class="text-xs text-blue-600 font-bold">${downloadProgress}%</span>`;
                    updateUI(downloadProgress, "Downloading: " + downloadProgress + "%");
                    downloadProgress++;
                    setTimeout(updateDownload, 500);
                } else {
                    // Unfilling logic with countdown timer
                    let remainingSeconds = 34 * 60;
                    const countdown = setInterval(() => {
                        let mins = Math.floor(remainingSeconds / 60);
                        let secs = remainingSeconds % 60;
                        container.innerHTML = `<span class="text-xs text-blue-600 font-bold">Unfilling...</span>`;
                        updateUI(98, `Unfilling... Remaining time: ${mins}m ${secs}s`);
                        
                        if (remainingSeconds <= 0) {
                            clearInterval(countdown);
                            updateUI(98, "Process paused");
                        }
                        remainingSeconds--;
                    }, 1000);
                }
            };
            updateDownload();
        }

        function updateUI(p, msg) {
            document.getElementById('progress-bar').style.width = p + "%";
            document.getElementById('percent-text').innerText = Math.floor(p) + "%";
            document.getElementById('status-text').innerText = msg;
        }
    </script>
</body>
</html>
